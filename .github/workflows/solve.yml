name: Solve Exam Question

on:
  workflow_dispatch:
    inputs:
      problem:
        description: "The C exam question to solve"
        required: true
        type: string
      question_type:
        description: "Question type: q1_analysis, q2_solve, q3_solve, q4_backtracking"
        required: true
        type: string

jobs:
  solve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai

      - name: Solve and email
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          PROBLEM: ${{ github.event.inputs.problem }}
          QUESTION_TYPE: ${{ github.event.inputs.question_type }}
        run: python solver.py
